<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Background</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background-color: #f8f4e8;
  }
  .bg-container {
    position: absolute;
    top: -5%;
    left: -5%;
    width: 110%;
    height: 110%;
    background-image: url('hero_bg.png');
    background-size: cover;
    background-position: center;
    animation: panZoom 15s ease-in-out infinite alternate;
  }
  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255, 107, 157, 0.4), rgba(255, 159, 127, 0.2), transparent);
    mix-blend-mode: multiply;
  }
  .sun-flare {
    position: absolute;
    top: 20%;
    left: 20%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(255, 230, 109, 0.3) 0%, transparent 70%);
    border-radius: 50%;
    mix-blend-mode: screen;
    animation: driftFlare 20s ease-in-out infinite alternate;
  }
  @keyframes panZoom {
    0% { transform: scale(1) translate(0, 0); }
    100% { transform: scale(1.08) translate(-2%, 2%); }
  }
  @keyframes driftFlare {
    0% { transform: translate(0, 0) scale(1); opacity: 0.6; }
    50% { transform: translate(10%, -10%) scale(1.2); opacity: 0.8; }
    100% { transform: translate(20%, -5%) scale(1); opacity: 0.5; }
  }
</style>
</head>
<body>
  <div class="bg-container"></div>
  <div class="overlay"></div>
  <div class="sun-flare"></div>
</body>
</html>
